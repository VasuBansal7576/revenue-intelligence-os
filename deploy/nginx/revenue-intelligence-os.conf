server {
  listen 443 ssl http2;
  server_name revenue.example.com;

  ssl_certificate /etc/letsencrypt/live/revenue.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/revenue.example.com/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name api.revenue.example.com;

  ssl_certificate /etc/letsencrypt/live/api.revenue.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.revenue.example.com/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:8010;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
